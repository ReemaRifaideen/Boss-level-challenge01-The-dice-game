<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Dice Game</title>
    <link rel="stylesheet" href="./styles.css">
    <link href="https://fonts.googleapis.com/css?family=Indie+Flower|Lobster" rel="stylesheet">

  </head>
  <body>

    <div class="container">
      <h1 id="result">🎲 Let's Roll! 🎲</h1>

      <div class="scoreboard">
        <div class="score-item">
          <p>Player 1</p>
          <div class="score-display" id="score1">0</div>
        </div>
        <span class="score-divider">VS</span>
        <div class="score-item">
          <p>Player 2</p>
          <div class="score-display" id="score2">0</div>
        </div>
      </div>

      <div class="dice-wrapper">
        <div class="dice">
          <p>Player 1</p>
          <img class="img1" src="images/dice6.png">
        </div>

        <div class="dice">
          <p>Player 2</p>
          <img class="img2" src="images/dice6.png">
        </div>
      </div>

      <div class="controls">
        <button id="rollBtn" class="btn btn-roll">🎲 Roll Dice</button>
        <button id="resetBtn" class="btn btn-reset">↻ Reset</button>
      </div>

      <p class="instruction">Press <kbd>SPACEBAR</kbd> to roll | Roll as many times as you want!</p>

    </div>

    <script src="./index.js" charset="utf-8"></script>

      </body>

      <footer>
        🎲 Epic Dice Game 🎲 | Press Space or Click to Play
      </footer>
    </html>
